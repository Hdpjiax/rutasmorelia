services:
  database:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_DB: rutas_morelia
      POSTGRES_USER: rutas
      POSTGRES_PASSWORD: rutas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rutas -d rutas_morelia"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://rutas:rutas@database:5432/rutas_morelia
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "4000:4000"
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/v1
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
